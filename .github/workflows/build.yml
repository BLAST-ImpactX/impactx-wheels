name: wheels

on: [push, pull_request]

env:
  SRC_REF: '26.06'
  COMMON_PATCHES: ''

jobs:
  build_wheels:
    name: ${{ matrix.name }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Per-entry knobs (sensible native defaults below):
        #   name         job display name
        #   platform     CIBW_PLATFORM                 (default auto)
        #   build        CIBW_BUILD                    (default *, i.e. all)
        #   patches      space-separated setup patches (default: none)
        #   sdist        also build + upload the sdist artifact (default: off)
        #   env.SIMD / env.WHEEL_ARCHFLAGS  per-arch vectorization (see below)
        include:
          - name: 64bit Linux
            os: ubuntu-24.04
            arch: "x86_64"
            sdist: true   # this reliable native leg also emits the sdist artifact
            env:
              SIMD: "ON"
              WHEEL_ARCHFLAGS: "-march=x86-64-v3 -mtune=generic"
              CMAKE_BUILD_PARALLEL_LEVEL: 4

          - name: 32bit Linux
            os: ubuntu-24.04
            arch: "i686"
            env:
              SIMD: "OFF"
              CMAKE_BUILD_PARALLEL_LEVEL: 4

          - name: 64bit Linux
            os: ubuntu-24.04-arm
            arch: "aarch64"
            env:
              SIMD: "ON"
              CMAKE_BUILD_PARALLEL_LEVEL: 4

          # builds faster on Travis-CI:
          #- name: 64bit Linux
          #  os: ubuntu-24.04
          #  arch: "ppc64le"
          #  env:
          #    CMAKE_BUILD_PARALLEL_LEVEL: 4

          # builds faster on Travis-CI:
          # blocked by https://github.com/GTkorvo/dill/issues/15
          #- name: 64bit Linux
          #  os: ubuntu-24.04
          #  arch: "s390x"
          #  env:
          #    CMAKE_BUILD_PARALLEL_LEVEL: 4

          # x86-64 (64bit)
          - name: 64bit Windows
            os: windows-2022
            arch: "AMD64"
            env:
              # Explicit SIMD (vir-simd) needs clang/gcc builtins, not MSVC, so SIMD stays OFF.
              # We still target AVX2 via MSVC codegen (/arch:AVX2): scalar FMA + auto-vectorization.
              SIMD: "OFF"
              WHEEL_ARCHFLAGS: "/arch:AVX2"
              CMAKE_BUILD_PARALLEL_LEVEL: 4

          # x86 (32bit)
          - name: 32bit Windows
            os: windows-2022
            arch: "x86"
            env:
              SIMD: "OFF"
              CMAKE_GENERATOR: "Visual Studio 17 2022"
              CMAKE_GENERATOR_PLATFORM: "Win32"
              CMAKE_BUILD_PARALLEL_LEVEL: 4

          - name: 64bit macOS
            os: macos-15-intel
            arch: "x86_64"
            env:
              SIMD: "ON"
              WHEEL_ARCHFLAGS: "-march=x86-64-v3 -mtune=generic"
              MACOSX_DEPLOYMENT_TARGET: 11.0
              CMAKE_BUILD_PARALLEL_LEVEL: 4

          # Apple Silicon M1/arm64/aarch64 builds:
          #   https://cibuildwheel.readthedocs.io/en/stable/faq/#apple-silicon
          - name: 64bit macOS
            os: macos-14
            arch: "arm64"
            env:
              SIMD: "ON"
              CMAKE_OSX_ARCHITECTURES: "arm64"
              MACOSX_DEPLOYMENT_TARGET: 11.0
              CMAKE_BUILD_PARALLEL_LEVEL: 3

          # Pyodide / WebAssembly (wasm32-emscripten); published to PyPI under the
          # pyemscripten platform tag (PEP 783).
          #   https://cibuildwheel.pypa.io/en/stable/platforms/#pyodide
          # Single-threaded NOACC (stock Pyodide cannot load -pthread modules),
          # HDF5 (openPMD) + FFT; MPI off. SIMD is OFF: WASM SIMD128 has no
          # vectorized transcendentals, so it is ~2.6x slower than scalar on
          # compute-bound elements (CI-measured). AMReX is statically linked into
          # both the amrex and impactx modules; on WASM that still resolves to one
          # AMReX runtime at load (verified in CI), so no wheel-repair is needed.
          - name: WebAssembly
            os: ubuntu-24.04
            arch: "wasm32"
            platform: "pyodide"
            build: "cp314-pyodide_wasm32"
            patches: ".github/setup-py-crosscompile-impactx.patch"
            env:
              SIMD: "OFF"
              CMAKE_BUILD_PARALLEL_LEVEL: 4

    steps:
    - uses: actions/checkout@v7
      with:
        repository: 'BLAST-ImpactX/impactx'
        path: 'src'
        ref: ${{ env.SRC_REF }}

    - uses: actions/checkout@v7
      with:
        path: 'src/.github/'

    # PyPI distribution differs from the upstream source: a dedicated README and
    # the `impactx-noacc` package name (sequential-CPU build).
    - name: Overwrite README & rename package for PyPI
      run: |
        cp src/.github/README.md src/
        python src/.github/rename_package.py src/setup.py

    - uses: actions/setup-python@v6
      name: Install Python
      with:
        python-version: "3.12"

    - name: Install cibuildwheel
      run: |
        python -m pip install --upgrade pip build setuptools[core] wheel
        python -m pip install cibuildwheel==4.1.0

    # Source patches not (yet) in the built release tag.
    # Applies all matrix.patches (if any), then the $COMMON_PATCHES.
    - name: Apply patches
      shell: bash
      run: |
        cd src
        for p in ${{ matrix.patches }} $COMMON_PATCHES; do
          git apply --ignore-whitespace "$p"
        done

    # In a separate directory, we want to upload it to PyPI last
    - name: Build sdist
      if: ${{ matrix.sdist }}
      run: |
        cd src
        python setup.py -q sdist --dist-dir ../sdist

    - uses: actions/upload-artifact@v7
      name: Upload sdist as GitHub artifact
      if: ${{ matrix.sdist }}
      with:
        name: sdist
        path: ./sdist
        overwrite: true

    - name: Build wheel
      env:
        # platform + selection (native defaults: auto / all archs / all builds)
        CIBW_PLATFORM: "${{ matrix.platform || 'auto' }}"
        CIBW_ARCHS: "${{ matrix.arch }}"
        CIBW_BUILD: "${{ matrix.build || '*' }}"
        CIBW_PROJECT_REQUIRES_PYTHON: ">=3.11"
        # (1) Disable PyPy (manylinux image: yum repo issues)
        #     https://github.com/pypa/manylinux/issues/899
        # (2) Disable musl until this AMReX TODO is fixed:
        #     https://github.com/AMReX-Codes/amrex/issues/4373
        CIBW_SKIP: "pp*-manylinux* *musllinux*"
        # Install dependencies (per platform). WASM cross-compiles its C/C++ deps
        # (zlib, HDF5, FFTW, AMReX) in BEFORE_BUILD: the Emscripten toolchain is
        # only on PATH after the pyodide xbuildenv is set up, and the same sysroot
        # is reused by the wheel build so CMake's find_package finds the libs.
        CIBW_BEFORE_BUILD_LINUX: bash -x .github/library_builders.sh
        CIBW_BEFORE_BUILD_MACOS: bash -x .github/library_builders.sh
        CIBW_BEFORE_BUILD_PYODIDE: bash -x .github/library_builders.sh wasm
        CIBW_BEFORE_BUILD_WINDOWS: 'cmd /E:ON /V:ON /C .github\library_builders.bat'
        # ImpactX wheel: sequential CPU (NOACC), FFT on, external static AMReX
        # (built by library_builders.sh), static HDF5/zlib. SIMD and the x86_64
        # march/mtune flags are per-arch: AMREX_SIMD drives the external AMReX
        # build, IMPACTX_SIMD the wheel.
        CIBW_ENVIRONMENT: >
          HDF5_USE_STATIC_LIBRARIES='ON'
          ZLIB_USE_STATIC_LIBS='ON'
          IMPACTX_AMREX_INTERNAL='OFF'
          IMPACTX_COMPUTE='NOACC'
          IMPACTX_FFT='ON'
          IMPACTX_SIMD='${{ matrix.env.SIMD }}'
          AMREX_SIMD='${{ matrix.env.SIMD }}'
          CFLAGS='${{ matrix.env.WHEEL_ARCHFLAGS }}'
          CXXFLAGS='${{ matrix.env.WHEEL_ARCHFLAGS }}'
          PKG_CONFIG_PATH='/usr/local/lib64/pkgconfig;/usr/local/lib/pkgconfig'
        # Pyodide overrides: single-core NOACC, MPI off, no SIMD (slower on WASM).
        # The zlibfix defines ZLIB::ZLIB so static HDF5 links libz (HDF5 omits
        # find_dependency(ZLIB); fixed upstream in openPMD-api#1894).
        CIBW_ENVIRONMENT_PYODIDE: >
          HDF5_USE_STATIC_LIBRARIES='ON'
          ZLIB_USE_STATIC_LIBS='ON'
          IMPACTX_AMREX_INTERNAL='OFF'
          IMPACTX_COMPUTE='NOACC'
          IMPACTX_FFT='ON'
          IMPACTX_MPI='OFF'
          IMPACTX_SIMD='OFF'
          IMPACTX_BUILD_SHARED_LIBS='OFF'
          AMREX_SIMD='OFF'
          IMPACTX_CMAKE_CMAKE_PROJECT_TOP_LEVEL_INCLUDES='/tmp/impactx-zlibfix.cmake'
        # ImpactX defaults Python IPO/LTO to ON; on Windows that enables /GL+/LTCG
        # via pybind11 and trips an MSVC ICE in WakeConvolution.cpp -> force off.
        # CFLAGS/CXXFLAGS carry /arch:AVX2 on AMD64 only (empty on Win32).
        CIBW_ENVIRONMENT_WINDOWS: >
          HDF5_USE_STATIC_LIBRARIES='ON'
          ZLIB_USE_STATIC_LIBS='ON'
          IMPACTX_AMREX_INTERNAL='OFF'
          IMPACTX_COMPUTE='NOACC'
          IMPACTX_FFT='ON'
          CFLAGS='${{ matrix.env.WHEEL_ARCHFLAGS }}'
          CXXFLAGS='${{ matrix.env.WHEEL_ARCHFLAGS }}'
          CMAKE_INTERPROCEDURAL_OPTIMIZATION='OFF'
          CMAKE_PREFIX_PATH='C:\Program Files (x86)\AMReX;C:\Program Files (x86)\fftw;C:\Program Files (x86)\zlib'
        # pyAMReX links the shared AMReX runtime on Windows -> vendor that DLL,
        # but --exclude the MSVC C++ runtime (delvewheel bundles it since cibw 4.0;
        # a private copy collides with co-loaded C++ extensions -> heap corruption).
        CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: >
          delvewheel repair --add-path "C:\Program Files (x86)\AMReX\bin" -v -w {dest_dir} {wheel}
          --exclude "msvcp140.dll;msvcp140_1.dll;msvcp140_2.dll;msvcp140_atomic_wait.dll;msvcp140_codecvt_ids.dll;vcruntime140.dll;vcruntime140_1.dll;concrt140.dll;vccorlib140.dll;vcomp140.dll;vcamp140.dll"
        # Fully static link => pyodide needs no wheel-repair step
        CIBW_REPAIR_WHEEL_COMMAND_PYODIDE: ""
        CMAKE_BUILD_PARALLEL_LEVEL: "${{ matrix.env.CMAKE_BUILD_PARALLEL_LEVEL }}"
        # C++17 support in macOS 10.13+ (partial) and 10.14+ (std::visit) and 10.15+ (std::filesystem::path)
        #   https://cibuildwheel.readthedocs.io/en/stable/cpp_standards/#macos-and-deployment-target-versions
        # arm64/aarch64 (M1/M2) requires 11.0+
        MACOSX_DEPLOYMENT_TARGET: "${{ matrix.env.MACOSX_DEPLOYMENT_TARGET }}"
        CMAKE_OSX_ARCHITECTURES: "${{ matrix.env.CMAKE_OSX_ARCHITECTURES }}"
        CMAKE_GENERATOR: "${{ matrix.env.CMAKE_GENERATOR }}"
        CMAKE_GENERATOR_PLATFORM: "${{ matrix.env.CMAKE_GENERATOR_PLATFORM }}"
        # Smoke test: shared-lib deps (check_wheel_libs.py), the push unit test,
        # and smoke_example.py (runs a FODO example + reads its openPMD monitor
        # with openpmd_api co-loaded in-process; it installs/skips its own
        # scipy/pandas/openpmd-api read-back deps, which have no 32-bit wheels).
        # Pyodide runs in a node sandbox -> best-effort `|| true`; native uses &&.
        CIBW_TEST_REQUIRES: pytest numpy
        CIBW_TEST_COMMAND: >
          python {project}/.github/check_wheel_libs.py &&
          pytest {project}/tests/python/test_push.py &&
          python {project}/.github/smoke_example.py
        CIBW_TEST_REQUIRES_PYODIDE: numpy
        CIBW_TEST_COMMAND_PYODIDE: >
          python {project}/.github/check_wheel_libs.py || true;
          python {project}/.github/wasm_smoke.py
        # Show a bit more output (pip -v)
        CIBW_BUILD_VERBOSITY: 1
      run: |
        cd src
        python -m pip install --upgrade pip build setuptools[core] wheel
        python -m pip install --upgrade cmake
        python -m cibuildwheel --output-dir ../wheelhouse

    - uses: actions/upload-artifact@v7
      name: Publish as GitHub artifact
      with:
        name: wheels-${{ matrix.os }}-${{ matrix.arch }}
        path: ./wheelhouse
        overwrite: true

    - name: Check wheels do not vendor the VC++ runtime
      if: runner.os == 'Windows'
      shell: bash
      run: |
        for whl in wheelhouse/*.whl; do
          python src/.github/check_no_vendored_runtime.py "$whl"
        done

    - name: Publish on pypi.org
      if: github.event_name == 'push' && github.repository == 'BLAST-ImpactX/impactx-wheels' && github.ref == 'refs/heads/wheels-noacc'
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.pypa_gh_action_upload }}
      run: |
        python -m pip install -U twine
        python -m twine upload --skip-existing wheelhouse/*

  # Publish the sdist last, so downstream user's and CI do not race for it
  # before all binary wheels are published.
  publish_sdist:
    name: Publish sdist (last)
    needs: [build_wheels]
    runs-on: ubuntu-24.04
    if: ${{ !cancelled() && github.event_name == 'push' && github.repository == 'BLAST-ImpactX/impactx-wheels' && github.ref == 'refs/heads/wheels-noacc' }}
    steps:
    - uses: actions/download-artifact@v8
      with:
        name: sdist
        path: ./wheelhouse

    - uses: actions/setup-python@v6
      name: Install Python
      with:
        python-version: "3.14"

    - name: Publish on pypi.org
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.pypa_gh_action_upload }}
      run: |
        python -m pip install -U twine
        python -m twine upload --skip-existing wheelhouse/*
